<!DOCTYPE html>
<html>
<head>
    <title>FightBet</title>

    <!-- Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        /* 🔝 Banner */
        .banner {
            height: 120px;
            background: url('https://images.unsplash.com/photo-1549719386-74dfcbf7dbed') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            font-color: black;
        }

        /* 📊 Menu */
        .menu {
            display: flex;
            justify-content: space-around;
            background: #1e293b;
            padding: 10px;
        }

        .menu button {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .menu button.active {
            border-bottom: 2px solid #22c55e;
        }

        /* 📦 Content */
        .content {
            padding: 15px;
        }

        /* 🥊 Fighters */
        .fight {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .fighter {
            text-align: center;
            width: 40%;
        }

        .fighter img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }

        .vs {
            font-weight: bold;
        }

        /* 🔘 Buttons */
        .bet-btn {
            background: #22c55e;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-top: 5px;
        }

        .bet-btn:hover {
            background: #16a34a;
        }

        /* 💰 Input */
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }

    </style>
</head>

<body>

<div class="banner">
    Fight Night 🥊
</div>

<div class="menu">
    <button onclick="showTab('open')" class="active">Open Bets</button>
    <button onclick="showTab('create')">Create Bet</button>
    <button onclick="showTab('my')">Your Bets</button>
</div>

<div class="content" id="content"></div>

<script>
    const fights = [
    {
        fighter1: "Johnny",
        img1: "images/johnny.PNG",
        fighter2: "Sedo",
        img2: "images/sedo.PNG"
    },
    {
        fighter1: "Nikatehilina",
        img1: "images/nikat.jpg",
        fighter2: "Geze",
        img2: "images/geze.jpg"
    }
];
const tg = window.Telegram.WebApp;
tg.expand();

// Default load
showTab('open');

function showTab(tab) {
    const content = document.getElementById("content");

    document.querySelectorAll(".menu button").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");

    if (tab === 'open') {
        content.innerHTML = `
            <h3>Available Bets</h3>
            <p>No bets yet</p>
        `;
    }

    if (tab === 'create') {
    let html = `<h3>Create Bet</h3>`;

    fights.forEach((fight) => {
        html += `
        <div class="fight">
            <div class="fighter">
                <img src="${fight.img1}">
                <p>${fight.fighter1}</p>
                <button class="bet-btn" onclick="selectFighter('${fight.fighter1}')">Select</button>
            </div>

            <div class="vs">VS</div>

            <div class="fighter">
                <img src="${fight.img2}">
                <p>${fight.fighter2}</p>
                <button class="bet-btn" onclick="selectFighter('${fight.fighter2}')">Select</button>
            </div>
        </div>
        `;
    });

    html += `
        <input id="amount" placeholder="Enter amount">
        <button class="bet-btn" onclick="createBet()">Create Bet</button>
    `;

    content.innerHTML = html;
}

    if (tab === 'my') {
        content.innerHTML = `
            <h3>Your Bets</h3>
            <p>No bets placed</p>
        `;
    }
}

let selectedFighter = null;

function selectFighter(fighter) {
    selectedFighter = fighter;
    alert("Selected Fighter " + fighter);
}

function createBet() {
    const amount = document.getElementById("amount").value;

    if (!selectedFighter) {
        return alert("Select a fighter");
    }

    if (!amount) {
        return alert("Enter amount");
    }

    alert(`Bet created: ${amount} on Fighter ${selectedFighter}`);
}
</script>

</body>
</html>
